name: Check Syntax

on:
  push:
    paths:
      - '**/*.py'
      - '.github/workflows/flake8.yaml'
  pull_request:
    paths:
      - '**/*.py'
      - '.github/workflows/flake8.yaml'

jobs:
  check:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - '3.6'
          - '3.9'
    container:
      image: python:${{ matrix.python-version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install flake8
        run: python -m pip install 'flake8<6'
      - name: Run flake8
        run: python -m flake8 --ignore=E501
      - name: Run tests
        run: python -m unittest discover -s tests
